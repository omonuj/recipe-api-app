name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests and flake8
        run: |
          docker compose run --rm app sh -c "\
            python manage.py wait_for_db && \
            python manage.py test && \
            flake8"

      - name: Tear down containers
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to Vercel
    needs: test
    runs-on: ubuntu-latest
    # Only deploy on pushes to master (not on pull requests).
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check Vercel is configured
        id: check
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN not set — skipping deploy. \
              Add VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID as \
              repository secrets to enable automatic deploys."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        if: steps.check.outputs.configured == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        if: steps.check.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        if: steps.check.outputs.configured == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        if: steps.check.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
